name: Docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whether docs build is needed
        id: docs-changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE" "$GITHUB_SHA" -- docs mkdocs.yml .github/workflows/docs.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.docs-changes.outputs.changed == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs dependencies
        if: steps.docs-changes.outputs.changed == 'true'
        run: pip install mkdocs-material mkdocs-static-i18n

      - name: Build docs
        if: steps.docs-changes.outputs.changed == 'true'
        run: mkdocs build

      - name: Skip docs build
        if: steps.docs-changes.outputs.changed != 'true'
        run: echo "No docs or MkDocs changes detected."

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs dependencies
        run: pip install mkdocs-material mkdocs-static-i18n

      - name: Deploy docs
        run: mkdocs gh-deploy --force
